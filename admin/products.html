<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — RK Packaging Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">RK</div>
        <div>
          <h3>RK Packaging</h3>
          <small>Admin Panel</small>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="products.html"><span class="nav-icon">📦</span> Products</a>
        <a href="gallery.html"><span class="nav-icon">🖼️</span> Gallery</a>
        <a href="contacts.html"><span class="nav-icon">📩</span> Messages</a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="logout()"><span class="nav-icon">🚪</span> Logout</button>
        <a href="/" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;color:rgba(255,255,255,0.5);font-weight:500;font-size:0.95rem;text-decoration:none;">
          <span class="nav-icon">🌐</span> View Website
        </a>
      </div>
    </aside>

    <main class="main-content">
      <h1 class="page-title">Products</h1>
      <p class="page-subtitle">Manage your product catalog</p>

      <div class="data-card">
        <div class="data-card-header">
          <h3>All Products</h3>
          <button class="btn-add" onclick="openModal('productModal')">+ Add Product</button>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Description</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr><td colspan="5" class="empty-state"><div class="icon">📦</div><p>Loading products...</p></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Add New Product</h3>
        <button class="modal-close" onclick="closeModal('productModal')">✕</button>
      </div>
      <div class="modal-body">
        <form onsubmit="handleAddProduct(event)">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="productName" placeholder="e.g. Corrugated Box 5-Ply" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea name="productDesc" placeholder="Describe the product..." required></textarea>
          </div>
          <div class="form-group">
            <label>Benefits (comma-separated)</label>
            <input type="text" name="productBenefits" placeholder="e.g. Durable, Lightweight, Custom sizes">
          </div>
          <div class="form-group">
            <label>Product Image</label>
            <input type="file" name="productImage" accept="image/*" required>
          </div>
          <button type="submit" class="btn-submit">Add Product</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Edit Product Modal -->
  <div class="modal-overlay" id="editProductModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Product</h3>
        <button class="modal-close" onclick="closeModal('editProductModal')">✕</button>
      </div>
      <div class="modal-body">
        <form onsubmit="handleEditProduct(event)">
          <input type="hidden" name="editProductId" id="editProductId">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="editProductName" id="editProductName" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea name="editProductDesc" id="editProductDesc" required></textarea>
          </div>
          <div class="form-group">
            <label>Benefits (comma-separated)</label>
            <input type="text" name="editProductBenefits" id="editProductBenefits">
          </div>
          <div class="form-group">
            <label>New Image (optional)</label>
            <input type="file" name="editProductImage" id="editProductImage" accept="image/*">
          </div>
          <button type="submit" class="btn-submit">Save Changes</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>loadAdminProducts();</script>
</body>
</html>
