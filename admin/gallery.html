<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — RK Packaging Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">RK</div>
        <div>
          <h3>RK Packaging</h3>
          <small>Admin Panel</small>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="products.html"><span class="nav-icon">📦</span> Products</a>
        <a href="gallery.html"><span class="nav-icon">🖼️</span> Gallery</a>
        <a href="contacts.html"><span class="nav-icon">📩</span> Messages</a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="logout()"><span class="nav-icon">🚪</span> Logout</button>
        <a href="/" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;color:rgba(255,255,255,0.5);font-weight:500;font-size:0.95rem;text-decoration:none;">
          <span class="nav-icon">🌐</span> View Website
        </a>
      </div>
    </aside>

    <main class="main-content">
      <h1 class="page-title">Gallery</h1>
      <p class="page-subtitle">Manage your gallery images</p>

      <div class="data-card">
        <div class="data-card-header">
          <h3>All Images</h3>
          <button class="btn-add" onclick="openModal('galleryModal')">+ Upload Image</button>
        </div>
        <div class="gallery-admin-grid" id="galleryAdminGrid">
          <div class="empty-state" style="grid-column:1/-1;"><div class="icon">🖼️</div><p>Loading gallery...</p></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="galleryModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Upload Image</h3>
        <button class="modal-close" onclick="closeModal('galleryModal')">✕</button>
      </div>
      <div class="modal-body">
        <form onsubmit="handleUploadGallery(event)">
          <div class="form-group">
            <label>Select Image</label>
            <input type="file" name="galleryImage" accept="image/*" required>
          </div>
          <div class="form-group">
            <label>Caption (optional)</label>
            <input type="text" name="galleryCaption" placeholder="Brief description...">
          </div>
          <button type="submit" class="btn-submit">Upload Image</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>loadAdminGallery();</script>
</body>
</html>
